
<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2b AHEAD KI-Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #FDFCFD;
        color: #111827;
      }
      .bg-primary { background-color: #64162D; }
      .text-primary { color: #64162D; }
      .border-primary { border-color: #64162D; }
      
      /* Custom Range Slider Styling */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range]:focus {
        outline: none;
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #F1E6E9;
        border-radius: 10px;
      }
      input[type=range]::-webkit-slider-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #64162D;
        cursor: pointer;
        -webkit-appearance: none;
        margin-top: -8px;
        box-shadow: 0 4px 10px rgba(100, 22, 45, 0.3);
        border: 3px solid white;
      }
      input[type=range]::-moz-range-track {
        width: 100%;
        height: 8px;
        cursor: pointer;
        background: #F1E6E9;
        border-radius: 10px;
      }
      input[type=range]::-moz-range-thumb {
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #64162D;
        cursor: pointer;
        border: 3px solid white;
        box-shadow: 0 4px 10px rgba(100, 22, 45, 0.3);
      }

      /* Print styles */
      @media print {
        @page {
          margin: 2cm;
          size: A4;
        }
        nav, .no-print, button, .ai-agent-toggle {
          display: none !important;
        }
        body {
          background: white !important;
          padding: 0 !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        .print-only {
          display: block !important;
        }
        .card-print {
          box-shadow: none !important;
          border: 1px solid #e5e7eb !important;
          break-inside: avoid;
          margin-bottom: 20px;
        }
        .page-break {
          page-break-before: always;
        }
        .max-w-7xl {
          max-width: 100% !important;
          padding: 0 !important;
        }
        /* Ensure charts print correctly */
        .recharts-responsive-container {
          width: 100% !important;
          height: 300px !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
